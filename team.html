<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teambuilding Bingo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
  .screen { display: none; }
  .screen.active { display: block; }
  .center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 20px; gap: 20px; }
  .card { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 380px; border: 1px solid #e0ded8; }
  label { display: block; font-size: 13px; font-weight: 500; color: #666; margin-bottom: 6px; }
  input[type=text], input[type=password] { width: 100%; padding: 11px 13px; border-radius: 9px; border: 1px solid #d3d1c7; font-size: 15px; outline: none; background: #fafaf8; }
  input:focus { border-color: #534ab7; }
  .btn { padding: 13px 0; border-radius: 10px; border: none; font-weight: 600; font-size: 15px; cursor: pointer; width: 100%; }
  .btn-green { background: #1d9e75; color: #fff; }
  .btn-green:disabled { background: #ccc; color: #999; cursor: default; }
  .btn-purple { background: #534ab7; color: #fff; }
  .btn-sm { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
  .tag { display: inline-flex; align-items: center; gap: 5px; background: #fafaf8; border: 1px solid #d3d1c7; border-radius: 20px; padding: 4px 12px; font-size: 13px; }
  .tag button { background: none; border: none; cursor: pointer; color: #888; font-size: 14px; line-height: 1; }
  .members-row { display: flex; gap: 8px; }
  .members-row input { flex: 1; }
  .members-row button { padding: 11px 16px; border-radius: 9px; border: none; background: #534ab7; color: #fff; font-size: 15px; cursor: pointer; }
  .tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }

  /* Bingo grid */
  #bingo-screen { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; }
  .cell { background: #f8f7f4; border: 1.5px solid #d3d1c7; color: #444; border-radius: 8px; padding: 10px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 90px; font-size: 11px; line-height: 1.4; user-select: none; transition: opacity .15s; }
  .cell:hover { opacity: .85; }
  .cell.submitted { background: #faeeda; border-color: #ef9f27; color: #633806; }
  .cell.approved { background: #eaf3de; border-color: #639922; color: #27500a; cursor: default; }
  .cell.rejected { background: #fcebeb; border-color: #e24b4a; color: #501313; }
  .cell .icon { font-size: 16px; margin-bottom: 4px; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .legend span { font-size: 11px; border-radius: 20px; padding: 2px 10px; border: 1px solid; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 20px; padding: 28px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; box-shadow: 0 32px 80px rgba(0,0,0,0.6); }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .modal-header h3 { font-size: 17px; font-weight: 600; color: #1a1a1a; }
  .close-btn { background: #f0efeb; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 16px; color: #444; display: flex; align-items: center; justify-content: center; }
  .task-box { background: #f5f4f0; border-radius: 10px; padding: 12px 14px; margin-bottom: 18px; font-size: 13px; color: #333; line-height: 1.55; font-weight: 500; }
  .upload-area { display: flex; flex-direction: column; align-items: center; gap: 8px; border: 2px dashed #ccc; border-radius: 12px; padding: 36px 16px; text-align: center; cursor: pointer; margin-bottom: 16px; background: #fafaf8; }
  .upload-area .big { font-size: 36px; }
  .upload-area .title { font-size: 14px; font-weight: 500; color: #333; }
  .upload-area .sub { font-size: 12px; color: #888; }
  #preview-img { max-width: 100%; max-height: 220px; border-radius: 10px; object-fit: cover; border: 2px solid #e0efe0; display: none; margin-bottom: 16px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 12px 0; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-cancel { border: 1.5px solid #ddd; background: #fff; color: #555; }
  .btn-retry { border: 1.5px solid #ddd; background: #fff; color: #555; flex: 0 !important; padding: 12px 14px !important; }

  /* Toast */
  #toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; align-items: center; z-index: 999; pointer-events: none; }
  .toast { color: #fff; border-radius: 50px; padding: 10px 20px; font-size: 14px; font-weight: 500; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.25); animation: toastIn .2s ease; }
  .toast.success { background: #1d9e75; }
  .toast.info { background: #534ab7; }
  .toast.error { background: #e24b4a; }
  @keyframes toastIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

  h1 { font-size: 26px; font-weight: 500; }
  h2 { font-size: 18px; font-weight: 500; }
  .sub-text { font-size: 13px; color: #666; margin-top: 4px; }
  .error-text { color: #a32d2d; font-size: 13px; margin-top: 4px; }
</style>
</head>
<body>

<div id="toast-container"></div>

<!-- Register screen -->
<div id="register-screen" class="screen active">
  <div class="center">
    <div style="text-align:center">
      <div style="font-size:40px;margin-bottom:8px">🎯</div>
      <h1>Teambuilding Bingo</h1>
      <p style="margin-top:8px;color:#666;font-size:14px">Registreer jullie team om te starten</p>
    </div>
    <div class="card" style="display:flex;flex-direction:column;gap:18px">
      <div>
        <label>Teamnaam</label>
        <input type="text" id="team-name-input" placeholder="bv. Team Rood">
      </div>
      <div>
        <label>Teamleden <span style="font-weight:400;color:#aaa">(optioneel)</span></label>
        <div class="members-row">
          <input type="text" id="member-input" placeholder="Naam teamlid...">
          <button onclick="addMember()">+</button>
        </div>
        <div class="tags" id="members-tags"></div>
      </div>
      <button class="btn btn-green" onclick="registerTeam()">Start de bingo →</button>
    </div>
  </div>
</div>

<!-- Bingo screen -->
<div id="bingo-screen" class="screen">
  <h2 id="team-title">🎯 Team</h2>
  <p class="sub-text" id="members-display"></p>
  <p class="sub-text" id="score-display">0/16 goedgekeurd</p>
  <div class="legend">
    <span style="background:#f8f7f4;border-color:#d3d1c7;color:#444">Niet gedaan</span>
    <span style="background:#faeeda;border-color:#ef9f27;color:#633806">Wacht op goedkeuring</span>
    <span style="background:#eaf3de;border-color:#639922;color:#27500a">Goedgekeurd ✓</span>
    <span style="background:#fcebeb;border-color:#e24b4a;color:#501313">Afgekeurd ✗</span>
  </div>
  <div class="grid" id="bingo-grid"></div>
</div>

<!-- Upload modal -->
<div class="overlay" id="upload-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>📷 Bewijs uploaden</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="task-box" id="modal-task-text"></div>
    <label class="upload-area" id="upload-area" for="file-input">
      <span class="big">📷</span>
      <span class="title">Tik om een foto te kiezen</span>
      <span class="sub">of maak een nieuwe foto</span>
    </label>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="onFileSelected(event)">
    <img id="preview-img" alt="preview">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn-retry" id="retry-btn" onclick="retryPhoto()" style="display:none">Opnieuw</button>
      <button class="btn btn-green" id="submit-btn" onclick="submitPhoto()" disabled>Insturen →</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://qlirvunlnxakbtbeeryu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsaXJ2dW5sbnhha2J0YmVlcnl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Mjk5MzIsImV4cCI6MjA5MDEwNTkzMn0.BWW0mvcshycK1pfKupSqSrHcj5H144sZs9kAeOCKNEA";

const TASKS = [
  "Maak een groepsselfie op een bijzondere plek",
  "Vraag iemand buiten het team om een handtekening",
  "Bouw iets met wat je bij je hebt",
  "Doe een challenge samen en film het",
  "Vind een voorwerp dat begint met elke letter van jullie teamnaam",
  "Maak een menselijke piramide",
  "Leer 5 woorden in een andere taal van een voorbijganger",
  "Maak een foto met iemand in een grappig kostuum of hoed",
  "Bedenk een teamlied en zing het",
  "Maak een foto waarbij het team een letter vormt met jullie lichamen",
  "Verzamel 5 handtekeningen van mensen die je niet kent",
  "Maak een foto met een standbeeld of kunstwerk",
  "Doe een goede daad en documenteer het",
  "Maak een panoramafoto van het hele team",
  "Vind en fotografeer iets blauw, rood én geel",
  "Recreëer een beroemde foto met het team",
];

let teamName = "";
let members = [];
let submissions = [];
let selectedTask = null;
let photoDataUrl = null;

async function sb(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": options.prefer || "",
    },
    ...options,
  });
  if (res.status === 204 || res.status === 201) return null;
  return res.json();
}

function toast(msg, type = "success", icon = "") {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = `${icon} ${msg}`;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function addMember() {
  const input = document.getElementById("member-input");
  const name = input.value.trim();
  if (!name || members.includes(name)) return;
  members.push(name);
  input.value = "";
  renderTags();
}

document.getElementById("member-input").addEventListener("keydown", e => { if (e.key === "Enter") addMember(); });
document.getElementById("team-name-input").addEventListener("keydown", e => { if (e.key === "Enter") registerTeam(); });

function renderTags() {
  const container = document.getElementById("members-tags");
  container.innerHTML = members.map(m => `
    <span class="tag">${m}<button onclick="removeMember('${m}')">✕</button></span>
  `).join("");
}

function removeMember(name) {
  members = members.filter(m => m !== name);
  renderTags();
}

async function registerTeam() {
  const name = document.getElementById("team-name-input").value.trim();
  if (!name) return;
  teamName = name;
  showScreen("bingo-screen");
  document.getElementById("team-title").textContent = `🎯 Team: ${teamName}`;
  document.getElementById("members-display").textContent = members.length ? members.join(" · ") : "";
  toast(`Welkom, team ${teamName}!`, "success", "👋");
  try {
    await sb("teams", {
      method: "POST",
      prefer: "resolution=ignore-duplicates",
      body: JSON.stringify({ name: teamName, members }),
    });
  } catch {}
  await loadSubmissions();
  renderGrid();
  setInterval(async () => { await loadSubmissions(); renderGrid(); }, 6000);
}

async function loadSubmissions() {
  try {
    const data = await sb(`submissions?team_name=eq.${encodeURIComponent(teamName)}&select=task_idx,status`, { method: "GET" });
    submissions = data || [];
  } catch {}
}

function getStatus(idx) {
  const s = submissions.find(s => s.task_idx === idx);
  return s ? s.status : "pending";
}

function renderGrid() {
  const grid = document.getElementById("bingo-grid");
  grid.innerHTML = TASKS.map((t, i) => {
    const s = getStatus(i);
    const icon = s === "approved" ? '<span class="icon">✓</span>' : s === "submitted" ? '<span class="icon">⏳</span>' : s === "rejected" ? '<span class="icon">✗</span>' : "";
    const clickable = s !== "approved" ? `onclick="openModal(${i})"` : "";
    return `<div class="cell ${s}" ${clickable}>${icon}<span>${t}</span></div>`;
  }).join("");
  const approved = TASKS.reduce((n, _, i) => n + (getStatus(i) === "approved" ? 1 : 0), 0);
  document.getElementById("score-display").textContent = `${approved}/16 goedgekeurd${checkBingo() ? " 🎉 BINGO!" : ""}`;
}

function checkBingo() {
  const a = i => getStatus(i) === "approved";
  for (let r = 0; r < 4; r++) if ([0,1,2,3].every(c => a(r*4+c))) return true;
  for (let c = 0; c < 4; c++) if ([0,1,2,3].every(r => a(r*4+c))) return true;
  if ([0,1,2,3].every(i => a(i*5))) return true;
  if ([0,1,2,3].every(i => a(i*4+(3-i)))) return true;
  return false;
}

function openModal(idx) {
  selectedTask = idx;
  photoDataUrl = null;
  document.getElementById("modal-task-text").textContent = TASKS[idx];
  document.getElementById("preview-img").style.display = "none";
  document.getElementById("upload-area").style.display = "flex";
  document.getElementById("retry-btn").style.display = "none";
  document.getElementById("submit-btn").disabled = true;
  document.getElementById("submit-btn").textContent = "Insturen →";
  document.getElementById("upload-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("upload-overlay").classList.remove("open");
  document.getElementById("file-input").value = "";
}

function retryPhoto() {
  photoDataUrl = null;
  document.getElementById("preview-img").style.display = "none";
  document.getElementById("upload-area").style.display = "flex";
  document.getElementById("retry-btn").style.display = "none";
  document.getElementById("submit-btn").disabled = true;
  document.getElementById("file-input").value = "";
}

function onFileSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    photoDataUrl = ev.target.result;
    resizeImage(photoDataUrl, 600).then(resized => {
      photoDataUrl = resized;
      const img = document.getElementById("preview-img");
      img.src = resized;
      img.style.display = "block";
      document.getElementById("upload-area").style.display = "none";
      document.getElementById("retry-btn").style.display = "block";
      document.getElementById("submit-btn").disabled = false;
      toast("Foto geselecteerd", "success", "🖼️");
    });
  };
  reader.readAsDataURL(file);
}

function resizeImage(dataUrl, maxW) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const c = document.createElement("canvas");
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      resolve(c.toDataURL("image/jpeg", 0.5));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

async function submitPhoto() {
  if (!photoDataUrl || selectedTask === null) return;
  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Bezig...";
  try {
    await sb("submissions", {
      method: "POST",
      prefer: "resolution=merge-duplicates",
      body: JSON.stringify({ team_name: teamName, task_idx: selectedTask, status: "submitted", photo_url: photoDataUrl }),
    });
    await loadSubmissions();
    renderGrid();
    closeModal();
    toast("Foto ingestuurd! Wacht op goedkeuring.", "info", "📤");
  } catch (err) {
    toast("Er ging iets mis, probeer opnieuw.", "error", "⚠️");
    btn.disabled = false;
    btn.textContent = "Insturen →";
  }
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>
</body>
</html>
